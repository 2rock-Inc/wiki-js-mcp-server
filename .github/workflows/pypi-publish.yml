name: Publish to PyPI

# Publishes the package to PyPI whenever a version tag (vX.Y.Z) is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no API token stored as a secret.
# One-time setup on PyPI: add a trusted publisher for this repo pointing at
# workflow "pypi-publish.yml" and environment "pypi". The first release can
# use PyPI's "pending publisher" flow (configure it before the project exists).

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
